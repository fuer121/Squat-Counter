name: SquatCounter
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
configs:
  Debug: debug
  Beta: release
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  SquatCounter:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SquatCounteriOS
      - path: Shared
    configFiles:
      Debug: Configs/Debug.xcconfig
      Beta: Configs/Beta.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fuer.SquatCounter
        PRODUCT_NAME: SquatCounter
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_KEY_CFBundleDisplayName: Squat Counter
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSSupportsLiveActivities: NO
    dependencies:
      - target: SquatCounterWatchApp
    scheme:
      testTargets:
        - SquatCounterTests
  SquatCounterWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: SquatCounterWatchApp
    configFiles:
      Debug: Configs/Debug.xcconfig
      Beta: Configs/Beta.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fuer.SquatCounter.watchkitapp
        PRODUCT_NAME: SquatCounterWatchApp
        INFOPLIST_KEY_CFBundleDisplayName: Squat Counter
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.fuer.SquatCounter
    dependencies:
      - target: SquatCounterWatchExtension
  SquatCounterWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: SquatCounterWatchExtension
      - path: Shared
    configFiles:
      Debug: Configs/Debug.xcconfig
      Beta: Configs/Beta.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fuer.SquatCounter.watchkitapp.watchkitextension
        WATCH_APP_BUNDLE_IDENTIFIER: com.fuer.SquatCounter.watchkitapp
        PRODUCT_NAME: SquatCounterWatchExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SquatCounterWatchExtension/Support/Info.plist
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
  SquatCounterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SquatCounterTests
      - path: Shared
    configFiles:
      Debug: Configs/Debug.xcconfig
      Beta: Configs/Beta.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fuer.SquatCounterTests
        PRODUCT_NAME: SquatCounterTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SquatCounter.app/SquatCounter
    dependencies:
      - target: SquatCounter
